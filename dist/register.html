<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>loginpage</title>
<link rel="stylesheet" href="./output.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />

</head>
<body>
<!--Navigator-->

  <nav class="fixed w-full bg-black bg-opacity-60 backdrop-blur-md z-50 shadow-md">
  <div class="max-w-7xl mx-auto flex items-center justify-between px-6 py-4">
    
    <!-- Logo -->
   <a href="./index.html"> <h1 class="text-3xl font-extrabold tracking-wide text-cyan-400">অধ্যায়</h1></a>

    <!-- Go Back Button -->
   
    <a href="index.html"> <button 
        class="flex items-center gap-2 bg-cyan-500/20 text-cyan-300 px-4 py-2 rounded-full 
               hover:bg-cyan-500 hover:text-white hover:scale-105 
               transition-all duration-300 shadow-md">
       
        <i class="fa-sharp fa-solid fa-house"></i>
      </button></a> 

  </div>
</nav>

<!-- registration section -->
<section class="min-h-screen flex items-center justify-center bg-gradient-to-r from-gray-900 via-gray-800 to-gray-900 p-6 pt-32 md:pt-24">
  <div class="w-full max-w-lg bg-gradient-to-br from-gray-500/90 via-gray-600/90 to-gray-500/90 backdrop-blur-md p-6 md:p-8 rounded-2xl shadow-2xl border border-white/30">
    
    <!-- Headline -->
    <h1 class="text-gray-200 text-3xl sm:text-4xl font-bold mb-6 text-center">
      Create an Account
    </h1>

    <!-- Form -->
    <form class="space-y-4">
      <!-- Name -->
      <div>
        <label for="name" class="block text-sm text-gray-300 mb-1">Full Name</label>
        <input id="name" type="text" required
               class="w-full px-4 py-3 rounded-lg bg-gray-300 text-gray-800 placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-sky-400 shadow-sm"
               placeholder="Your full name" />
      </div>

      <!-- Email / Phone -->
      <div>
        <label for="contact" class="block text-sm text-gray-300 mb-1">Email / Phone</label>
        <input id="contact" type="text" required
               class="w-full px-4 py-3 rounded-lg bg-gray-300 text-gray-800 placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-sky-400 shadow-sm"
               placeholder="@email / phone" />
      </div>

      <!-- Class -->
      <div>
        <label for="class" class="block text-sm text-gray-300 mb-1">Class</label>
        <select id="class" required
                class="w-full px-4 py-3 rounded-lg bg-gray-300 text-gray-800 focus:outline-none focus:ring-2 focus:ring-sky-400 shadow-sm">
          <option selected disabled value="">Select Class</option>
          <option>Class 6</option>
          <option>Class 7</option>
          <option>Class 8</option>
          <option>Class 9</option>
          <option>Class 10</option>
          <option>Class 11</option>
          <option>Class 12</option>
        </select>
      </div>

      <!-- Group -->
      <div>
        <label for="group" class="block text-sm text-gray-300 mb-1">Group</label>
        <select id="group" required
                class="w-full px-4 py-3 rounded-lg bg-gray-300 text-gray-800 focus:outline-none focus:ring-2 focus:ring-sky-400 shadow-sm">
          <option selected disabled="">Select Group</option>
          <option>Science</option>
          <option>Arts</option>
          <option>Commerce</option>
        </select>
      </div>

      <!-- Password -->
      <div>
        <label for="password" class="block text-sm text-gray-300 mb-1">Password</label>
        <input id="password" type="password" required
               class="w-full px-4 py-3 rounded-lg bg-gray-300 text-gray-800 placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-sky-400 shadow-sm"
               placeholder="Enter password" />
      </div>

      <!-- Confirm Password -->
      <div>
        <label for="confirm" class="block text-sm text-gray-300 mb-1">Confirm Password</label>
        <input id="confirm" type="password" required
               class="w-full px-4 py-3 rounded-lg bg-gray-300 text-gray-800 placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-sky-400 shadow-sm"
               placeholder="Re-enter password" />
      </div>

      <!-- Submit Button -->
      <button type="submit"
              class="w-full mt-3 px-4 py-3 rounded-2xl bg-gradient-to-r from-sky-700 to-indigo-800 text-gray-100 font-semibold hover:from-sky-600 hover:to-indigo-700 transition shadow-lg">
        Register
      </button>
    </form>

    <!-- Login link -->
    <p class="text-center text-sm text-gray-300 mt-4">
      Already have an account?
      <a href="./login.html" class="text-sky-400 hover:underline font-medium">Log in</a>
    </p>

  </div>
</section>







  <!-- Footer -->
  <footer class="text-center py-6 bg-black text-gray-400 text-sm">
    © 2025 ODDHAY — All Rights Reserved
  <div class="text-center flex flex-row justify-center items-center gap-5 text-sm pt-3 ">
  
         <a href="privacy"> <p class="text-gray-400">Privacy Policy</p> </a>
         <a href="refund"> <p class="text-gray-400">Refund Policy</p> </a>
          <a href="terms"> <p class="text-gray-400">Terms & Conditions</p> </a>
          <a href="FAQ"> <p class="text-gray-400">FAQ</p> </a>

</div>

  </footer>
</body>
</html>
