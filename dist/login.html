<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>loginpage</title>
<link rel="stylesheet" href="./output.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />

</head>
<body>
<!--Navigator-->

  <nav class="fixed w-full bg-black bg-opacity-60 backdrop-blur-md z-50 shadow-md">
  <div class="max-w-7xl mx-auto flex items-center justify-between px-6 py-4">
    
    <!-- Logo -->
   <a href="./index.html"> <h1 class="text-3xl font-extrabold tracking-wide text-cyan-400">অধ্যায়</h1></a>

    <!-- Go Back Button -->
    
    <a href="index.html"> <button 
        class="flex items-center gap-2 bg-cyan-500/20 text-cyan-300 px-4 py-2 rounded-full 
               hover:bg-cyan-500 hover:text-white hover:scale-105 
               transition-all duration-300 shadow-md">
       
        <i class="fa-sharp fa-solid fa-house"></i>
      </button></a> 

  </div>
</nav>


      

<!-- login -->
<section class="min-h-screen flex items-center justify-center bg-gradient-to-r from-gray-900 via-gray-800 to-gray-900 p-6">
  <!-- Login Form -->
  <div class="w-full max-w-md bg-gradient-to-br from-gray-700 via-gray-600 to-gray-700 backdrop-blur-md p-8 rounded-2xl shadow-2xl border border-gray-500/30">
    <h1 class="text-gray-200 text-4xl font-bold mb-6 text-center">Log in</h1>

    <form class="space-y-4">
      <!-- Email / Phone -->
      <div>
        <label class="block text-sm text-gray-200 mb-1" for="email">Email / Phone</label>
        <input id="email" type="email" required
               class="w-full px-4 py-3 rounded-lg bg-gray-800 text-white placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-teal-400 shadow-sm"
               placeholder="@email / phone" />
      </div>

      <!-- Password -->
      <div>
        <label class="block text-sm text-gray-200 mb-1" for="password">Password</label>
        <input id="password" type="password" required
               class="w-full px-4 py-3 rounded-lg bg-gray-800 text-white placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-teal-400 shadow-sm"
               placeholder="Type password" />
      </div>

      <!-- Sign In Button -->
      <button type="submit"
              class="w-full mt-2 px-4 py-3 rounded-2xl bg-gradient-to-r from-teal-500 to-cyan-600 text-white font-semibold hover:from-teal-600 hover:to-cyan-700 transition shadow-lg ">
        Sign in
      </button>
    </form>

    <p class="text-center text-sm text-gray-300 mt-4">
      Don't have an account?
      <a href="./register.html" class="text-teal-400 hover:underline font-medium">Sign up</a>
    </p>
  </div>
</section>



  <!-- Footer -->
  <footer class="text-center py-6 bg-black text-gray-400 text-sm">
    © 2025 ODDHAY — All Rights Reserved
  <div class="text-center flex flex-row justify-center items-center gap-5 text-sm pt-3 ">
  
         <a href="privacy"> <p class="text-gray-400">Privacy Policy</p> </a>
         <a href="refund"> <p class="text-gray-400">Refund Policy</p> </a>
          <a href="terms"> <p class="text-gray-400">Terms & Conditions</p> </a>
          <a href="FAQ"> <p class="text-gray-400">FAQ</p> </a>

</div>

  </footer>
</body>
</html>
