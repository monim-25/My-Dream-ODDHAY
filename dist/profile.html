<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>loginpage</title>
<link rel="stylesheet" href="./output.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />

</head>
<body>
  



<!-- Sidebar Component -->
<div class="fixed top-0 left-0 h-full w-64 bg-gray-800 text-cyan-300 px-4 py-6 flex flex-col justify-start z-50">
  <!-- Logo + Icon (Responsive) -->
  <div class="flex items-center justify-center gap-3 mb-8">
    <i class="fa-solid fa-user text-2xl text-gray-200"></i>
    <p class="text-3xl font-bold whitespace-nowrap">অধ্যায়</p>
  </div>

  <!-- Menu List -->
  <ul class="space-y-2">
    <li class="flex items-center gap-3 text-xl font-semibold px-4 py-2 hover:bg-gray-700 rounded cursor-pointer">
      <i class="fa-solid fa-house text-cyan-300"></i>
      <span>Dashboard</span>
    </li>
    <li class="flex items-center gap-3 text-xl font-semibold px-4 py-2 hover:bg-gray-700 rounded cursor-pointer">
      <i class="fa-solid fa-book text-cyan-300"></i>
      <span>Library</span>
    </li>
    <li class="flex items-center gap-3 text-xl font-semibold px-4 py-2 hover:bg-gray-700 rounded cursor-pointer">
      <i class="fa-solid fa-users text-cyan-300"></i>
      <span>Community</span>
    </li>
    <li class="flex items-center gap-3 text-xl font-semibold px-4 py-2 hover:bg-gray-700 rounded cursor-pointer">
      <i class="fa-solid fa-pen-to-square text-cyan-300"></i>
      <span>Self Test</span>
    </li>
    <li class="flex items-center gap-3 text-xl font-semibold px-4 py-2 hover:bg-gray-700 rounded cursor-pointer">
      <i class="fa-solid fa-trophy text-cyan-300"></i>
      <span>Leaderboard</span>
    </li>
  </ul>
</div>

<!-- Mobile Toggle Button -->
<button class="md:hidden fixed top-4 left-4 z-50 bg-gray-700 text-cyan-300 px-3 py-2 rounded" onclick="document.getElementById('mobileSidebar').classList.toggle('-translate-x-full')">
  <i class="fa-solid fa-bars"></i>
</button>

<!-- Mobile Sidebar -->
<div id="mobileSidebar" class="md:hidden fixed top-0 left-0 w-64 h-full bg-gray-800 text-cyan-300 px-4 py-6 transform -translate-x-full transition-transform duration-300 z-40">
  <!-- Logo + Icon -->
  <div class="flex items-center justify-center gap-3 mb-8">
    <i class="fa-solid fa-user text-2xl text-gray-200"></i>
    <p class="text-3xl font-bold whitespace-nowrap">অধ্যায়</p>
  </div>

  <!-- Menu List -->
  <ul class="space-y-2">
    <li class="flex items-center gap-3 text-xl font-semibold px-4 py-2 hover:bg-gray-700 rounded cursor-pointer">
      <i class="fa-solid fa-house text-cyan-300"></i>
      <span>Dashboard</span>
    </li>
    <li class="flex items-center gap-3 text-xl font-semibold px-4 py-2 hover:bg-gray-700 rounded cursor-pointer">
      <i class="fa-solid fa-book text-cyan-300"></i>
      <span>Library</span>
    </li>
    <li class="flex items-center gap-3 text-xl font-semibold px-4 py-2 hover:bg-gray-700 rounded cursor-pointer">
      <i class="fa-solid fa-users text-cyan-300"></i>
      <span>Community</span>
    </li>
    <li class="flex items-center gap-3 text-xl font-semibold px-4 py-2 hover:bg-gray-700 rounded cursor-pointer">
      <i class="fa-solid fa-pen-to-square text-cyan-300"></i>
      <span>Self Test</span>
    </li>
    <li class="flex items-center gap-3 text-xl font-semibold px-4 py-2 hover:bg-gray-700 rounded cursor-pointer">
      <i class="fa-solid fa-trophy text-cyan-300"></i>
      <span>Leaderboard</span>
    </li>
  </ul>
</div>




  </body>
  </html>
